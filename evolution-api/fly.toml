app = 'uerj-evolution'
primary_region = 'gru'

[build]
  image = 'atendai/evolution-api:v1.8.2'

[env]
  AUTHENTICATION_TYPE = 'apikey'
  AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES = 'true'
  QRCODE_LIMIT = '30'
  LOG_LEVEL = 'ERROR'
  STORE_MESSAGES = 'true'
  STORE_MESSAGE_UP = 'true'
  STORE_CONTACTS = 'true'
  STORE_CHATS = 'true'

# Secrets (definir via: fly secrets set NOME=valor)
# AUTHENTICATION_API_KEY
# SERVER_URL=https://uerj-evolution.fly.dev

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'evolution_data'
  destination = '/evolution/instances'
