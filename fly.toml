app = 'uerj-monitor'
primary_region = 'gru'

# Secrets (definir via: fly secrets set NOME=valor)
# UERJ_LOGIN
# UERJ_PASSWORD
# TELEGRAM_BOT_TOKEN
# TELEGRAM_CHAT_ID

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

[[mounts]]
  source = 'monitor_data'
  destination = '/app/data'
